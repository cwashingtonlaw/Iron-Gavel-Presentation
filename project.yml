name: IronGavel
options:
  bundleIdPrefix: com.danielswashington
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
targets:
  IronGavel:
    type: application
    platform: iOS
    sources:
      - path: IronGavel
    info:
      path: IronGavel/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleExternalDisplayNonInteractive:
              - UISceneConfigurationName: Jury
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).JurySceneDelegate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielswashington.irongavel
        TARGETED_DEVICE_FAMILY: "2"
  IronGavelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IronGavelTests
    dependencies:
      - target: IronGavel
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/IronGavel.app/IronGavel
  IronGavelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: IronGavelUITests
    dependencies:
      - target: IronGavel
schemes:
  IronGavel:
    build:
      targets:
        IronGavel: all
        IronGavelTests: [test]
        IronGavelUITests: [test]
    test:
      targets:
        - IronGavelTests
        - IronGavelUITests
